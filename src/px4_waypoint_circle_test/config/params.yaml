# Odom source (W: x前 y左 z上)
odom_topic: "/Odometry"

# Control loop
publish_rate: 20.0            # Hz (should be >= 2Hz)
position_tolerance: 0.25      # m

# Circle flight around fixed W-frame center (0, 0, circle_z)
circle_z: 1                 # m
circle_radius: 0.8            # m
circle_laps: 5               # laps
circle_period: 10.0           # seconds per lap

# Safety timeout (whole mission)
timeout: 300.0                # s
