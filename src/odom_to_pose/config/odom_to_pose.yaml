input_topic: "/fastlio/odom"
output_odometry_topic: "/Odometry"
output_vision_topic: "/mavros/vision_pose/pose"

# Frame id for corrected /Odometry and /mavros/vision_pose/pose
output_frame_id: "map"

# If true, drop full orientation when publishing vision pose and keep yaw only
# Corrected /Odometry always publishes the full transformed quaternion.
yaw_only: false
